name = "wc2026"
main = "worker/worker.js"
compatibility_date = "2026-06-11"

[[kv_namespaces]]
binding = "STATS_KV"
id = "749700d94d114156a758b14e2e9b6587"

[triggers]
crons = ["*/30 * * * *", "0 */2 * * *", "10 */2 * * *", "20 */2 * * *"]

# ── Environnement staging ─────────────────────────────────────────────────────
[env.staging]
name = "wc2026-staging"

[[env.staging.kv_namespaces]]
binding = "STATS_KV"
id = "226dc371905c4fc7a5b32bc5db2c344d"

# Pas de crons sur staging (Free plan : un seul Worker avec triggers auto)
[env.staging.triggers]
crons = []
