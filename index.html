// Calcule la minute approximative d'un match en cours
function liveMinute(m){
  if(!m.isLive) return null;
  var now = new Date();
  // Parse kickoff time from m.time (format "20h00") and m.dayKey (format "2026-06-11")
  if(!m.time || !m.dayKey) return null;
  var timeParts = m.time.match(/(\d+)h(\d+)/);
  if(!timeParts) return null;
  var h = parseInt(timeParts[1]), min = parseInt(timeParts[2]);
  // Build kickoff date in Casablanca (UTC+1)
  var dateParts = m.dayKey.split('-');
  var kickoffUTC = new Date(Date.UTC(
    parseInt(dateParts[0]), parseInt(dateParts[1])-1, parseInt(dateParts[2]),
    h-1, min // UTC = Casablanca - 1h
  ));
  var elapsedMs = now - kickoffUTC;
  var elapsedMin = Math.floor(elapsedMs / 60000);
  if(elapsedMin < 0) return null;
  if(elapsedMin <= 45) return elapsedMin + "'";
  if(elapsedMin <= 60) return 'Mi-temps';
  if(elapsedMin <= 105) return (elapsedMin - 15) + "'"; // approx 15min halftime
  if(elapsedMin <= 120) return 'Prolongations';
  return '90+';
}
function hex2rgba(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}

function groupByDate(arr){
  var map=new Map();
  var sorted=arr.slice().sort(function(a,b){var dk=a.dayKey.localeCompare(b.dayKey);if(dk!==0)return dk;return (a.time||'').localeCompare(b.time||'');});
  sorted.forEach(function(m){var k=m.dateLabel;if(!map.has(k))map.set(k,[]);map.get(k).push(m);});
  return Array.from(map.entries());
}

async function fetchAll(){
  setStatus('loading','Actualisation\u2026');
  document.getElementById('refresh-btn').textContent='\u8635 \u2026';
  if(PROXY_BASE.includes('REMPLACER')){setStatus('error','Proxy non configur\u00e9');loadFallback();renderAll();document.getElementById('loading').classList.add('hidden');showView(activeView);document.getElementById('refresh-btn').textContent='\u8635 Actualiser';return;}
  try{
    var wcResults=await Promise.all([fetch(PROXY_BASE+'/fd/competitions/WC/matches'),fetch(PROXY_BASE+'/fd/competitions/WC/standings')]);
    var r1=wcResults[0],r2=wcResults[1];
    if(!r1.ok)throw new Error('Proxy '+r1.status);
    var data1=await r1.json();
    loadFallback();
    processMatches(data1.matches||[]);
    if(r2.ok){var data2=await r2.json();processStandings(data2.standings||[]);}
    else{console.warn('[WC2026] standings failed:',r2.status);}
    if(!Object.keys(standings).length)computeStandingsFromMatches();
    setStatus('ok','En ligne \u2713');
    var now=new Date();
    document.getElementById('last-update').textContent='Mis \u00e0 jour '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    renderAll();fetchScorers();fetchESPNIds();
    document.getElementById('loading').classList.add('hidden');
    showView(activeView);
  }catch(e){
    console.warn('API error:',e.message);
    setStatus('error','Hors ligne \u2013 donn\u00e9es statiques');
    loadFallback();renderAll();
    document.getElementById('loading').classList.add('hidden');
    showView(activeView);
  }
  document.getElementById('refresh-btn').textContent='\u8635 Actualiser';
}

function setStatus(state,label){
  var dot=document.getElementById('conn-dot'),lbl=document.getElementById('conn-label');

  if(state==='ok')dot.style.background='#22c55e';
  if(state==='error')dot.style.background='#ef4444';
  lbl.textContent=label;
}

function processMatches(matches){
  var apiByKey={};
  matches.forEach(function(m){
    var d=m.utcDate?m.utcDate.slice(0,10):'';
    var home=normTeam((m.homeTeam&&m.homeTeam.name)||'');
    var away=normTeam((m.awayTeam&&m.awayTeam.name)||'');
    apiByKey[d+'|'+home]=m;
    apiByKey[d+'|'+away]=m;
  });
  allMatches=allMatches.map(function(sm){
    var apiM=apiByKey[sm.dayKey+'|'+sm.t1]||apiByKey[sm.dayKey+'|'+sm.t2];
    if(!apiM)return sm;
    var isLive=['IN_PLAY','PAUSED'].includes(apiM.status);
    var isFT=apiM.status==='FINISHED';
    var score=null;
    if(isFT&&apiM.score&&apiM.score.fullTime){var s=apiM.score.fullTime;if(s.home!==null&&s.away!==null)score=s.home+' \u2013 '+s.away;}
    if(isLive){var sl=apiM.score&&apiM.score.fullTime;score=(sl&&sl.home!=null?sl.home:0)+' \u2013 '+(sl&&sl.away!=null?sl.away:0);}
    var t1u=sm.ko?normTeam((apiM.homeTeam&&(apiM.homeTeam.shortName||apiM.homeTeam.name))||sm.t1):sm.t1;
    var t2u=sm.ko?normTeam((apiM.awayTeam&&(apiM.awayTeam.shortName||apiM.awayTeam.name))||sm.t2):sm.t2;
    return Object.assign({},sm,{t1:t1u,t2:t2u,score:score,status:apiM.status,isLive:isLive,isFT:isFT,apiId:apiM.id});
  });
}

function processStandings(data){
  standings={};
  data.forEach(function(s){
    if(s.type==='TOTAL'&&s.group&&s.table&&s.table.length){
      var grp=s.group.replace('GROUP_','').replace('Group ','').trim();
      if(!GC[grp])return;
      standings[grp]=s.table.map(function(r){return{pos:r.position,team:r.team.shortName||r.team.name,played:r.playedGames,won:r.won,draw:r.draw,lost:r.lost,gf:r.goalsFor,ga:r.goalsAgainst,gd:r.goalDifference,pts:r.points};});
    }
  });
}

function humanPhase(s){var m={'GROUP_STAGE':'Groupe','ROUND_OF_32':'32es','ROUND_OF_16':'16es','QUARTER_FINALS':'Quarts','SEMI_FINALS':'Demis','THIRD_PLACE':'3e Place','FINAL':'Finale'};return m[s]||s;}
function phaseColor(s){var m={'ROUND_OF_32':'#8b5cf6','ROUND_OF_16':'#f59e0b','QUARTER_FINALS':'#ef4444','SEMI_FINALS':'#f97316','THIRD_PLACE':'#64748b','FINAL':'#fbbf24'};return m[s]||'#94a3b8';}

function computeStandingsFromMatches(){
  standings={};
  var byGrp={};
  allMatches.filter(function(m){return !m.ko;}).forEach(function(m){if(!byGrp[m.grp])byGrp[m.grp]=new Set();byGrp[m.grp].add(m.t1);byGrp[m.grp].add(m.t2);});
  var stats={};
  Object.entries(byGrp).forEach(function(e){var g=e[0],teams=e[1];stats[g]={};teams.forEach(function(t){stats[g][t]={played:0,won:0,draw:0,lost:0,gf:0,ga:0,pts:0};});});
  allMatches.filter(function(m){return !m.ko&&m.isFT&&m.score;}).forEach(function(m){
    var parts=m.score.split(' \u2013 ');if(parts.length!==2)return;
    var g1=parseInt(parts[0]),g2=parseInt(parts[1]);if(isNaN(g1)||isNaN(g2))return;
    var g=m.grp;if(!stats[g]||!stats[g][m.t1]||!stats[g][m.t2])return;
    stats[g][m.t1].played++;stats[g][m.t1].gf+=g1;stats[g][m.t1].ga+=g2;
    stats[g][m.t2].played++;stats[g][m.t2].gf+=g2;stats[g][m.t2].ga+=g1;
    if(g1>g2){stats[g][m.t1].won++;stats[g][m.t1].pts+=3;stats[g][m.t2].lost++;}
    else if(g1<g2){stats[g][m.t2].won++;stats[g][m.t2].pts+=3;stats[g][m.t1].lost++;}
    else{stats[g][m.t1].draw++;stats[g][m.t1].pts++;stats[g][m.t2].draw++;stats[g][m.t2].pts++;}
  });
  Object.entries(stats).forEach(function(e){
    var grp=e[0],teams=e[1];
    var table=Object.entries(teams).map(function(te){var t=te[0],s=te[1];return Object.assign({team:t},s,{gd:s.gf-s.ga});});
    table.sort(function(a,b){return(b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);});
    table.forEach(function(r,i){r.pos=i+1;});
    standings[grp]=table;
  });
}

// Auto-découverte des IDs ESPN pour les matchs non encore mappés
function fetchESPNIds(){
  var today = new Date();
  var dates = [];
  for(var i=-1; i<=2; i++){
    var d = new Date(today);
    d.setDate(d.getDate()+i);
    var y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');
    dates.push(''+y+mo+dy);
  }
  dates.forEach(function(dateStr){
    fetch(ESPN_BASE+'/scoreboard?dates='+dateStr)
      .then(function(r){return r.json();})
      .then(function(data){
        data.events&&data.events.forEach(function(e){
          // Chercher le match correspondant par date + équipes
          var eDate = dateStr.slice(0,4)+'-'+dateStr.slice(4,6)+'-'+dateStr.slice(6,8);
          var match = allMatches.find(function(m){
            if(m.dayKey!==eDate) return false;
            var eName=e.name.toLowerCase();
            return eName.includes(m.t1.toLowerCase().slice(0,4))||
                   eName.includes(m.t2.toLowerCase().slice(0,4));
          });
          if(match&&!ESPN_ID_MAP[match.id]){
            ESPN_ID_MAP[match.id]=e.id;
            console.log('[ESPN] mapped',match.id,'->',e.id,e.name);
          }
        });
      })
      .catch(function(){});
  });
}

// Mise à jour des scores en direct via ESPN (plus rapide que football-data.org)
function fetchESPNLiveScores(){
  var today = new Date();
  var y=today.getFullYear(),mo=String(today.getMonth()+1).padStart(2,'0'),dy=String(today.getDate()).padStart(2,'0');
  var dateStr=''+y+mo+dy;
  fetch(ESPN_BASE+'/scoreboard?dates='+dateStr)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.events||!data.events.length)return;
      var updated=false;
      data.events.forEach(function(e){
        var status=e.status&&e.status.type&&e.status.type.state; // 'pre','in','post'
        if(status!=='in'&&status!=='post')return;
        // Find matching match in allMatches by ESPN ID
        var matchId=null;
        Object.entries(ESPN_ID_MAP).forEach(function(entry){
          if(entry[1]===e.id)matchId=entry[0];
        });
        if(!matchId)return;
        var m=allMatches.find(function(m){return m.id===matchId;});
        if(!m)return;
        var comps=e.competitions&&e.competitions[0]&&e.competitions[0].competitors||[];
        var home=comps.find(function(c){return c.homeAway==='home';})||{};
        var away=comps.find(function(c){return c.homeAway==='away';})||{};
        var newScore=(home.score||'0')+' – '+(away.score||'0');
        var isLive=status==='in';
        var isFT=status==='post';
        if(m.score!==newScore||m.isLive!==isLive||m.isFT!==isFT){
          m.score=newScore;
          m.isLive=isLive;
          m.isFT=isFT;
          if(isFT)m.status='FINISHED';
          if(isLive)m.status='IN_PLAY';
          updated=true;
        }
      });
      if(updated){
        renderGroupsTimeline();
        renderKOTimeline();
        renderStandings();
        // Recompute standings from ESPN scores if FD standings not available
        computeStandingsFromMatches();
        renderStandings();
      }
    })
    .catch(function(){});
}

function renderESPNStats(m,d,espnId){

    '<div style="font-size:10px;color:#64748b;margin-top:2px">'+statusStr+'</div></div>';

  var teams=d.boxscore&&d.boxscore.teams||[];
  if(teams.length===2){
    var s0=teams[0].statistics||[],s1=teams[1].statistics||[];
    var LABELS={'foulsCommitted':'Fautes','yellowCards':'Cartons jaunes','redCards':'Cartons rouges',
      'offsides':'Hors-jeux','cornerKicks':'Corners','saves':'Arrêts',
      'possessionPct':'Possession %','totalShots':'Tirs','shotsOnTarget':'Tirs cadrés'};
    var ORDER=['possessionPct','totalShots','shotsOnTarget','cornerKicks','foulsCommitted','yellowCards','redCards','offsides','saves'];
    html+='<div style="font-size:9px;color:#0ea5e9;font-weight:700;letter-spacing:1px;margin-bottom:6px">STATISTIQUES</div>';
    html+='<div style="background:#080f1e;border-radius:8px;padding:8px 10px;margin-bottom:10px">';
    ORDER.forEach(function(name){
      var st0=s0.find(function(x){return x.name===name;}),st1=s1.find(function(x){return x.name===name;});
      if(!st0&&!st1)return;
      var v0=parseFloat((st0&&st0.displayValue)||'0')||0;

      var total=v0+v1||1,pct0=Math.round(v0/total*100);
      html+='<div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)">'+
        '<span style="min-width:26px;font-size:11px;font-weight:800;color:'+m.color+';text-align:right">'+v0+'</span>'+
        '<div style="flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">'+
          '<div style="height:100%;width:'+pct0+'%;background:'+m.color+';border-radius:2px"></div></div>'+
        '<span style="font-size:9px;color:#64748b;min-width:90px;text-align:center">'+(LABELS[name]||name)+'</span>'+
        '<div style="flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;transform:scaleX(-1)">'+
          '<div style="height:100%;width:'+(100-pct0)+'%;background:#94a3b8;border-radius:2px"></div></div>'+
        '<span style="min-width:26px;font-size:11px;font-weight:800;color:#94a3b8">'+v1+'</span></div>';
    });

      '<span style="color:'+m.color+'">'+m.t1+'</span><span style="color:#94a3b8">'+m.t2+'</span></div></div>';
  }
  // Buts
  var events=d.keyEvents||[];
  var goals=events.filter(function(e){return e.scoringPlay;});

    html+='<div style="background:#080f1e;border-radius:6px;padding:6px 10px;margin-bottom:10px">';
    goals.forEach(function(g){
      var teamName=g.team&&g.team.displayName?normTeam(g.team.displayName):'';
      var gColor=teamName===m.t1?m.color:'#94a3b8';
      var rawText=g.shortText||g.text||'';

      // shortText format: "Player Name Goal" → "Player Name (Team) Goal"
      var displayText=rawText;

  var bg=document.createElement('span');bg.className='grp-badge';bg.style.background=hex2rgba(m.color,0.15);bg.style.color=m.color;bg.textContent=m.grp?'Gr.'+m.grp:(m.phase||'');
  var mid=document.createElement('span');mid.className='match-id';mid.textContent=m.id.length>4?'':m.id;
  var tim=document.createElement('span');tim.className='match-time';tim.textContent=m.time||'';

  var teams=document.createElement('span');teams.className='match-teams';
  teams.innerHTML=m.t1+'<span class="vs">\u2013</span>'+m.t2;

  var sc=document.createElement('span');sc.className='match-score';sc.style.color=m.color;
  if(m.isLive){var lm=liveMinute(m);sc.innerHTML='<span class="status-live">\u26a1 '+(m.score||'0\u20130')+(lm?' '+lm:'')+'</span>';}
  else if(m.isFT&&m.score){sc.textContent=m.score;sc.style.color='#e2e8f0';}
  else sc.innerHTML='<span class="status-ns">\u2013</span>';

  var city=document.createElement('span');city.className='match-city';
  city.textContent=m.city?(m.venue?'\ud83d\udccd'+m.venue+' \u00b7 '+m.city:'\ud83d\udccd'+m.city):'';

  row.appendChild(bg);row.appendChild(mid);row.appendChild(tim);row.appendChild(teams);row.appendChild(sc);row.appendChild(city);

  if(m.last){var t=document.createElement('span');t.className='tag';t.style.background=hex2rgba(m.color,.2);t.style.color=m.color;t.textContent='J3';row.appendChild(t);}

  // Action icons
  var actions=document.createElement('div');actions.className='match-actions';
  actions.onclick=function(e){e.stopPropagation();};

  if(m.isLive||m.isFT){
    // Stats button
    var btnInfo=document.createElement('button');btnInfo.className='action-btn';btnInfo.title='Stats du match';btnInfo.textContent='\ud83d\udcca';btnInfo.style.color=m.color;
    btnInfo.onclick=function(){openMatchInfo(m);};
    actions.appendChild(btnInfo);
    // Lineup button (only if ESPN ID exists)
    if(ESPN_ID_MAP[m.id]){
      var _m=m, _eid=ESPN_ID_MAP[m.id];
      var btnLineup=document.createElement('button');
      btnLineup.className='action-btn';
      btnLineup.title='Compositions';
      btnLineup.textContent='\ud83d\udc55';
      btnLineup.style.color=_m.color;
      btnLineup.addEventListener('click',function(e){
        e.stopPropagation();
        _currentMatch=_m;
        openLineupESPN(_eid);
      });
      actions.appendChild(btnLineup);
    }
  }
  if(m.venue&&VENUE_COORDS[m.venue]){
    var btnMap=document.createElement('button');btnMap.className='action-btn';btnMap.title='Voir le stade';btnMap.textContent='\ud83d\uddfa\ufe0f';
    btnMap.onclick=function(){openMap(m);};
    actions.appendChild(btnMap);
  }
  if(actions.childNodes.length)row.appendChild(actions);

  row.addEventListener('click',function(){selectedId=selectedId===m.id?null:m.id;renderAll();});
  return row;
}

function renderDayBlock(dateLabel,matches,container){
  var isToday=matches[0]&&matches[0].dayKey===TODAY_STR;
  var block=document.createElement('div');block.className='day-block';
  var tlCol=document.createElement('div');tlCol.className='timeline-col';
  var dot=document.createElement('div');dot.className='tl-dot'+(isToday?' today':'');
  var line=document.createElement('div');line.className='tl-line';
  tlCol.appendChild(dot);tlCol.appendChild(line);
  var content=document.createElement('div');content.className='day-content';
  var hdr=document.createElement('div');hdr.className='day-header';
  var lbl=document.createElement('span');lbl.className='day-label'+(isToday?' today':'');lbl.textContent=dateLabel;
  var cnt=document.createElement('span');cnt.className='match-count';cnt.textContent=matches.length+' match'+(matches.length>1?'s':'');
  hdr.appendChild(lbl);hdr.appendChild(cnt);
  if(isToday){var tod=document.createElement('span');tod.className='today-tag';tod.textContent="AUJOURD'HUI";hdr.appendChild(tod);}
  var list=document.createElement('div');list.className='match-list';
  matches.forEach(function(m){list.appendChild(renderMatchRow(m));});
  content.appendChild(hdr);content.appendChild(list);
  block.appendChild(tlCol);block.appendChild(content);
  container.appendChild(block);
}

function renderGrpFilters(){
  var c=document.getElementById('grp-filters');c.innerHTML='';
  var all=document.createElement('button');all.className='grp-btn';all.textContent='Tous';
  if(activeFilter==='all'){all.style.background='#0ea5e922';all.style.borderColor='#0ea5e9';all.style.color='#0ea5e9';}
  all.addEventListener('click',function(){activeFilter='all';renderAll();});c.appendChild(all);
  Object.entries(GC).forEach(function(e){var g=e[0],col=e[1];
    var btn=document.createElement('button');btn.className='grp-btn';btn.textContent='Gr.'+g;
    if(activeFilter===g){btn.style.background=hex2rgba(col,.13);btn.style.borderColor=col;btn.style.color=col;}
    btn.addEventListener('click',function(){activeFilter=g;renderAll();});c.appendChild(btn);
  });
}

function renderGroupsTimeline(){
  var c=document.getElementById('groups-timeline');c.innerHTML='';
  var filtered=activeFilter==='all'?allMatches.filter(function(m){return !m.ko;}):allMatches.filter(function(m){return m.grp===activeFilter;});
  groupByDate(filtered).forEach(function(e){renderDayBlock(e[0],e[1],c);});
}

function renderKOTimeline(){
  var c=document.getElementById('knockout-timeline');c.innerHTML='';

function renderStandings(){
  var grid=document.getElementById('standings-grid');grid.innerHTML='';
  if(!Object.keys(standings).length){grid.innerHTML='<p style="color:#475569;font-size:11px;padding:12px">Classements disponibles d\u00e8s le d\u00e9but du tournoi.</p>';return;}
  Object.entries(GC).forEach(function(e){var g=e[0],col=e[1];
    if(!standings[g])return;
    var card=document.createElement('div');card.className='standing-card';card.style.borderColor=hex2rgba(col,.3);
    var hdr=document.createElement('div');hdr.className='standing-card-header';hdr.style.background=hex2rgba(col,.15);hdr.style.color=col;hdr.textContent='GROUPE '+g;card.appendChild(hdr);
    var grpPlayed=standings[g].some(function(r){return r.played>0;});
    standings[g].forEach(function(r,i){
      var qualified=grpPlayed&&i<2;
      var row=document.createElement('div');row.className='standing-row';
      var dot=document.createElement('div');dot.className='qualified-dot';dot.style.background=qualified?col:i===2&&grpPlayed?hex2rgba(col,.4):'#1e3a5f';
      var pos=document.createElement('span');pos.className='standing-pos';pos.style.color=qualified?col:'#475569';pos.textContent=r.pos+'.';
      var team=document.createElement('span');team.className='standing-team';team.textContent=r.team;
      var pts=document.createElement('span');pts.className='standing-pts';pts.style.color=qualified?col:'#64748b';pts.textContent=r.pts;
      var stats=document.createElement('span');stats.className='standing-stats';stats.textContent=r.played+'J '+(r.gd>0?'+':'')+r.gd;
      row.appendChild(dot);row.appendChild(pos);row.appendChild(team);row.appendChild(pts);row.appendChild(stats);card.appendChild(row);
    });
    grid.appendChild(card);
  });
}

function renderScorers(){
  var c=document.getElementById('scorers-list');if(!c)return;c.innerHTML='';
  if(!scorers.length){c.innerHTML='<p style="color:#475569;font-size:11px;padding:16px">Aucun buteur enregistr\u00e9 pour l\u2019instant.</p>';return;}
  var html='<div style="background:#080f1e;border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden;padding:4px 12px;">';
  for(var i=0;i<scorers.length;i++){
    var s=scorers[i];var player=s.player||{};var team=s.team||{};
    var goals=s.goals||0;var assists=s.assists||0;var penalties=s.penalties||0;
    var rank=i+1;var rankColor=rank===1?'#fbbf24':rank===2?'#94a3b8':rank===3?'#cd7f32':'#475569';
    html+='<div class="scorer-row">'+
      '<span class="scorer-rank" style="color:'+rankColor+'">'+rank+'</span>'+
      '<span class="scorer-name">'+(player.name||'?')+
        '<span style="font-size:9px;color:#64748b;font-weight:400;margin-left:4px">('+normTeam(team.shortName||team.name||'')+')' +
        '</span></span>'+
      '<span class="scorer-goals" style="color:#22c55e">\u26bd '+goals+'</span>'+
      (assists?'<span style="font-size:9px;color:#64748b;margin-left:4px">+'+assists+' passes</span>':'')+
      (penalties?'<span style="font-size:8px;color:#f59e0b;margin-left:4px">('+penalties+' pen.)</span>':'')+
      '</div>';
  }
  html+='</div>';c.innerHTML=html;
}

function renderAll(){
  renderGrpFilters();renderGroupsTimeline();renderKOTimeline();renderKOLegend();renderStandings();
}

function showView(v){
  ['groups','standings','knockout','scorers'].forEach(function(id){document.getElementById('view-'+id).classList.toggle('hidden',id!==v);});
  document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',['groups','standings','knockout','scorers'][i]===v);});
}

function switchView(v){activeView=v;showView(v);if(v==='scorers')renderScorers();}

function scheduleRefresh(){
  var hasLive=allMatches.some(function(m){return m.isLive;});
  var delay=hasLive?30000:300000;
  setTimeout(async function(){
    // ESPN refresh rapide pour les scores en direct
    fetchESPNLiveScores();
    // football-data.org refresh complet (moins fréquent si pas de match en direct)
    if(!hasLive || Math.random() < 0.2){ // toutes les ~5 refreshes ESPN
      await fetchAll();
    }
    scheduleRefresh();
  },delay);
}

// Refresh ESPN toutes les 30s quand match en cours
function startESPNLiveRefresh(){
  setInterval(function(){
    if(allMatches.some(function(m){return m.isLive;})){
      fetchESPNLiveScores();
    }
  },30000);
}
