<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coupe du Monde 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,#0c1628 0%,#060c18 70%,#020408 100%);
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#e2e8f0;padding:16px 0 48px;
}
#header{text-align:center;margin-bottom:18px}
#header .eyebrow{font-size:10px;color:#0ea5e9;letter-spacing:4px;font-weight:700;margin-bottom:3px}
#header h1{
  font-size:clamp(20px,4vw,32px);font-weight:900;letter-spacing:-1px;margin:0 0 3px;
  background:linear-gradient(90deg,#fbbf24,#f97316,#ef4444);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#header .sub{font-size:10px;color:#475569}
#tabs{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.tab-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.1);color:#64748b;border-radius:20px;padding:5px 16px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#0ea5e911;border-color:#0ea5e9;color:#0ea5e9}

/* STATUS BAR */
#status-bar{
  max-width:720px;margin:0 auto 12px;padding:0 16px;
  display:flex;align-items:center;gap:8px;
}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:#080f1e;border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;padding:4px 10px;font-size:9px;color:#64748b;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:#475569}
.status-dot.live{background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 1.5s infinite}
.status-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#last-update{font-size:9px;color:#334155;margin-left:auto}
#refresh-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.08);
  color:#475569;border-radius:12px;padding:3px 10px;font-size:9px;
  cursor:pointer;transition:all .2s;
}
#refresh-btn:hover{color:#94a3b8;border-color:rgba(255,255,255,0.2)}

#main{max-width:720px;margin:0 auto;padding:0 16px}

/* FILTERS */
#grp-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.grp-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#64748b;border-radius:14px;padding:3px 9px;font-size:9px;font-weight:700;cursor:pointer;transition:all .15s}

/* INFO BAR */
.info-bar{display:flex;gap:6px;margin-bottom:14px;padding:8px 12px;background:#080f1e;border:1px solid rgba(255,255,255,0.05);border-radius:8px;font-size:10px;color:#475569;flex-wrap:wrap}
.info-bar b{color:#94a3b8}
.sep{color:#1e3a5f}

/* KO LEGEND */
#ko-legend{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.phase-badge{border-radius:8px;padding:3px 8px;font-size:9px;font-weight:700}

/* STANDINGS */
#standings-panel{margin-bottom:16px}
.standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.standing-card{background:#080f1e;border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}
.standing-card-header{padding:6px 10px;font-size:10px;font-weight:800;letter-spacing:.5px}
.standing-row{display:flex;align-items:center;gap:6px;padding:4px 10px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px}
.standing-row:last-child{border-bottom:none}
.standing-pos{min-width:16px;font-size:9px;font-weight:700}
.standing-team{flex:1;color:#e2e8f0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standing-pts{font-size:11px;font-weight:800;min-width:20px;text-align:right}
.standing-stats{font-size:8px;color:#475569;min-width:60px;text-align:right}
.qualified-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* TIMELINE */
.day-block{display:flex;gap:0}
.timeline-col{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;margin-right:10px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#1e3a5f;border:2px solid #1e40af;flex-shrink:0;margin-top:3px}
.tl-dot.today{background:#fbbf24;border-color:#fbbf24}
.tl-line{flex:1;width:2px;background:linear-gradient(180deg,#1e3a5f,transparent);min-height:20px}
.day-content{flex:1;padding-bottom:18px}
.day-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.day-label{font-size:11px;font-weight:800;color:#e2e8f0;letter-spacing:.3px}
.day-label.today{color:#fbbf24}
.match-count{font-size:9px;color:#334155;background:rgba(255,255,255,0.03);border-radius:10px;padding:1px 7px}
.today-tag{font-size:8px;background:#fbbf2422;color:#fbbf24;border-radius:8px;padding:2px 7px;font-weight:700}
.match-list{background:#080f1e;border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}

/* MATCH ROW */
.match-row{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:all .12s;position:relative}
.match-row:last-child{border-bottom:none}
.match-row:hover{background:rgba(255,255,255,0.02)}
.grp-badge{min-width:28px;height:20px;border-radius:5px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;letter-spacing:.5px;flex-shrink:0}
.match-id{font-size:9px;color:#475569;min-width:26px;flex-shrink:0}
.match-time{font-size:9px;color:#64748b;min-width:38px;flex-shrink:0;font-variant-numeric:tabular-nums}
.match-teams{flex:1;font-size:11px;color:#e2e8f0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-teams .vs{color:#334155;margin:0 4px}
.match-score{font-size:12px;font-weight:900;min-width:36px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.match-city{font-size:9px;color:#475569;white-space:nowrap;flex-shrink:0}
.tag{font-size:8px;border-radius:4px;padding:1px 4px;flex-shrink:0;font-weight:700}

/* STATUS TAGS */
.status-live{font-size:8px;background:#22c55e22;color:#22c55e;border-radius:4px;padding:1px 5px;font-weight:700;animation:pulse 1.5s infinite}
.status-ft{font-size:8px;color:#475569}
.status-ns{font-size:8px;color:#334155}

/* LOADING */
#loading{text-align:center;padding:40px;color:#475569;font-size:12px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #1e3a5f;border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="header">
  <div class="eyebrow">FIFA · USA · MEXIQUE · CANADA</div>
  <h1>COUPE DU MONDE 2026</h1>
  <div class="sub">11 Juin – 19 Juillet · 48 équipes · 104 matchs</div>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchView('groups')">📋 Phase de Groupes</button>
    <button class="tab-btn" onclick="switchView('standings')">📊 Classements</button>
    <button class="tab-btn" onclick="switchView('knockout')">🏆 Élimination Directe</button>
  </div>
</div>

<div id="status-bar">
  <div class="status-pill">
    <div class="status-dot" id="conn-dot"></div>
    <span id="conn-label">Connexion…</span>
  </div>
  <span id="last-update"></span>
  <button id="refresh-btn" onclick="fetchAll()">↻ Actualiser</button>
</div>

<div id="main">
  <div id="loading"><div class="spinner"></div><br>Chargement des données…</div>

  <!-- GROUPES -->
  <div id="view-groups" class="hidden">
    <div id="grp-filters"></div>
    <div class="info-bar">
      <span>⚽ <b>72</b> matchs · groupe</span><span class="sep">·</span>
      <span>🏁 <b>J3</b> = matchs simultanés</span><span class="sep">·</span>
      <span>🔴 Score en direct</span>
    </div>
    <div id="groups-timeline"></div>
  </div>

  <!-- CLASSEMENTS -->
  <div id="view-standings" class="hidden">
    <div class="info-bar">
      <span>🟢 Qualifié direct</span><span class="sep">·</span>
      <span>🟡 Possible 3e qualifié</span><span class="sep">·</span>
      <span>Pts = Points · J = Joués · GD = Diff. buts</span>
    </div>
    <div class="standings-grid" id="standings-grid"></div>
  </div>

  <!-- ÉLIMINATION DIRECTE -->
  <div id="view-knockout" class="hidden">
    <div id="ko-legend"></div>
    <div id="knockout-timeline"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_TOKEN = '1f86c65f6b334db9b61eb411f3e2e0f1';
const BASE = 'https://api.football-data.org/v4';
const HEADERS = {'X-Auth-Token': API_TOKEN};
const TODAY_STR = new Date().toISOString().slice(0,10);

// ─── GROUP COLORS ─────────────────────────────────────────────────────────────
const GC = {
  A:"#0ea5e9",B:"#06b6d4",C:"#10b981",D:"#f59e0b",
  E:"#ef4444",F:"#f97316",G:"#8b5cf6",H:"#ec4899",
  I:"#14b8a6",J:"#a855f7",K:"#22c55e",L:"#f43f5e"
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let allMatches = [];
let standings = {};
let activeFilter = 'all';
let activeView = 'groups';
let selectedId = null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function hex2rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function groupByDate(arr){
  const map=new Map();
  arr.forEach(m=>{
    const k=m.dateLabel;
    if(!map.has(k))map.set(k,[]);
    map.get(k).push(m);
  });
  return [...map.entries()];
}

// Format date label in French
function frDate(isoStr){
  const d=new Date(isoStr);
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  return `${days[d.getUTCDay()]} ${d.getUTCDate()} ${months[d.getUTCMonth()]}`;
}

function frTime(isoStr){
  const d=new Date(isoStr);
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',hour12:false});
}

function dayKey(isoStr){
  return isoStr.slice(0,10);
}

// ─── API FETCH ────────────────────────────────────────────────────────────────
async function fetchAll(){
  setStatus('loading','Actualisation…');
  document.getElementById('refresh-btn').textContent='↻ …';

  try {
    // Fetch all WC matches
    const r1 = await fetch(`${BASE}/competitions/WC/matches`, {headers:HEADERS});
    if(!r1.ok) throw new Error('API '+r1.status);
    const data1 = await r1.json();

    // Fetch standings
    const r2 = await fetch(`${BASE}/competitions/WC/standings`, {headers:HEADERS});
    const data2 = r2.ok ? await r2.json() : null;

    processMatches(data1.matches || []);
    if(data2) processStandings(data2.standings || []);

    setStatus('ok','En ligne');
    const now=new Date();
    document.getElementById('last-update').textContent=
      `Mis à jour ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    renderAll();
    document.getElementById('loading').classList.add('hidden');
    showView(activeView);

  } catch(e){
    setStatus('error','Hors ligne – données statiques');
    loadFallback();
    renderAll();
    document.getElementById('loading').classList.add('hidden');
    showView(activeView);
  }
  document.getElementById('refresh-btn').textContent='↻ Actualiser';
}

function setStatus(state, label){
  const dot=document.getElementById('conn-dot');
  const lbl=document.getElementById('conn-label');
  dot.className='status-dot';
  if(state==='loading')dot.classList.add('loading');
  if(state==='ok')dot.style.background='#22c55e';
  if(state==='error')dot.style.background='#ef4444';
  lbl.textContent=label;
}

// ─── PROCESS API DATA ─────────────────────────────────────────────────────────
function processMatches(matches){
  allMatches = matches.map(m=>{
    const grp = m.group ? m.group.replace('GROUP_','') : null;
    const phase = m.stage || '';
    const ko = !grp;
    const color = grp ? GC[grp] : phaseColor(phase);
    const isLive = m.status==='IN_PLAY'||m.status==='PAUSED';
    const isFT   = m.status==='FINISHED';

    // Score display
    let score = null;
    if(m.score && m.score.fullTime){
      const s=m.score.fullTime;
      if(s.home!==null && s.away!==null) score=`${s.home} – ${s.away}`;
    }
    if(isLive && m.score && m.score.currentTime){
      const s=m.score.fullTime;
      score = (s.home!==null?s.home:'0')+' – '+(s.away!==null?s.away:'0');
    }

    return {
      id: String(m.id),
      apiId: m.id,
      dateLabel: frDate(m.utcDate),
      dayKey: dayKey(m.utcDate),
      time: frTime(m.utcDate),
      grp,
      phase: humanPhase(phase),
      phaseRaw: phase,
      color,
      t1: m.homeTeam?.shortName || m.homeTeam?.name || 'À déterminer',
      t2: m.awayTeam?.shortName || m.awayTeam?.name || 'À déterminer',
      city: m.venue || '',
      score,
      status: m.status,
      isLive,
      isFT,
      last: m.stage==='GROUP_STAGE' && isLastMatchday(m),
      ko,
    };
  });
}

function isLastMatchday(m){
  return m.matchday===3;
}

function phaseColor(stage){
  const map={
    'ROUND_OF_32':'#8b5cf6','ROUND_OF_16':'#f59e0b',
    'QUARTER_FINALS':'#ef4444','SEMI_FINALS':'#f97316',
    'THIRD_PLACE':'#64748b','FINAL':'#fbbf24'
  };
  return map[stage]||'#94a3b8';
}

function humanPhase(stage){
  const map={
    'GROUP_STAGE':'Groupe','ROUND_OF_32':'32es','ROUND_OF_16':'16es',
    'QUARTER_FINALS':'Quarts','SEMI_FINALS':'Demis',
    'THIRD_PLACE':'3e Place','FINAL':'Finale'
  };
  return map[stage]||stage;
}

function processStandings(data){
  standings={};
  data.forEach(s=>{
    if(s.type==='TOTAL' && s.group){
      const grp=s.group.replace('GROUP_','');
      standings[grp]=s.table.map(r=>({
        pos:r.position,
        team:r.team.shortName||r.team.name,
        played:r.playedGames,
        won:r.won,draw:r.draw,lost:r.lost,
        gf:r.goalsFor,ga:r.goalsAgainst,
        gd:r.goalDifference,
        pts:r.points,
      }));
    }
  });
}

// ─── FALLBACK (static data if API fails) ──────────────────────────────────────
function loadFallback(){
  // Minimal static fallback — groups only, no scores
  const staticData=[
    {id:"M1", day:"2026-06-11",time:"20h00",grp:"A",t1:"Mexique",       t2:"Afrique du Sud",city:"Mexico City",   last:false},
    {id:"M2", day:"2026-06-12",time:"20h00",grp:"A",t1:"Corée du Sud",  t2:"Tchéquie",      city:"Guadalajara",   last:false},
    {id:"M7", day:"2026-06-12",time:"22h00",grp:"B",t1:"Canada",        t2:"Bosnie-H.",     city:"Toronto",       last:false},
    {id:"M13",day:"2026-06-12",time:"02h00",grp:"C",t1:"Brésil",        t2:"Maroc",         city:"New York/NJ",   last:false},
    {id:"M19",day:"2026-06-12",time:"03h00",grp:"D",t1:"USA",           t2:"Paraguay",      city:"Los Angeles",   last:false},
    {id:"M8", day:"2026-06-13",time:"20h00",grp:"B",t1:"Qatar",         t2:"Suisse",        city:"San Francisco", last:false},
    {id:"M14",day:"2026-06-13",time:"23h00",grp:"C",t1:"Écosse",        t2:"Haïti",         city:"Boston",        last:false},
    {id:"M20",day:"2026-06-13",time:"04h00",grp:"D",t1:"Australie",     t2:"Turquie",       city:"Vancouver",     last:false},
    {id:"M25",day:"2026-06-14",time:"20h00",grp:"E",t1:"Allemagne",     t2:"Curaçao",       city:"Houston",       last:false},
    {id:"M26",day:"2026-06-14",time:"23h00",grp:"E",t1:"Côte d'Ivoire", t2:"Équateur",      city:"Philadelphie",  last:false},
    {id:"M31",day:"2026-06-14",time:"02h00",grp:"F",t1:"Pays-Bas",      t2:"Japon",         city:"Dallas",        last:false},
    {id:"M32",day:"2026-06-14",time:"04h00",grp:"F",t1:"Suède",         t2:"Tunisie",       city:"Monterrey",     last:false},
    {id:"M37",day:"2026-06-15",time:"20h00",grp:"G",t1:"Belgique",      t2:"Égypte",        city:"Seattle",       last:false},
    {id:"M38",day:"2026-06-15",time:"23h00",grp:"G",t1:"Iran",          t2:"Nv-Zélande",    city:"Los Angeles",   last:false},
    {id:"M43",day:"2026-06-15",time:"20h00",grp:"H",t1:"Espagne",       t2:"Cap-Vert",      city:"Atlanta",       last:false},
    {id:"M44",day:"2026-06-15",time:"02h00",grp:"H",t1:"Arabie S.",     t2:"Uruguay",       city:"Miami",         last:false},
    {id:"M49",day:"2026-06-16",time:"21h00",grp:"I",t1:"France",        t2:"Sénégal",       city:"New York/NJ",   last:false},
    {id:"M50",day:"2026-06-16",time:"00h00",grp:"I",t1:"Irak",          t2:"Norvège",       city:"Boston",        last:false},
    {id:"M55",day:"2026-06-16",time:"03h00",grp:"J",t1:"Argentine",     t2:"Algérie",       city:"Kansas City",   last:false},
    {id:"M56",day:"2026-06-16",time:"04h00",grp:"J",t1:"Autriche",      t2:"Jordanie",      city:"San Francisco", last:false},
    {id:"M61",day:"2026-06-17",time:"20h00",grp:"K",t1:"Portugal",      t2:"Congo RD",      city:"Houston",       last:false},
    {id:"M62",day:"2026-06-17",time:"23h00",grp:"K",t1:"Ouzbékistan",   t2:"Colombie",      city:"Mexico City",   last:false},
    {id:"M67",day:"2026-06-17",time:"22h00",grp:"L",t1:"Angleterre",    t2:"Croatie",       city:"Dallas",        last:false},
    {id:"M68",day:"2026-06-17",time:"01h00",grp:"L",t1:"Ghana",         t2:"Panama",        city:"Toronto",       last:false},
  ];
  allMatches = staticData.map(m=>({
    ...m,
    dateLabel: frDate(m.day+'T19:00:00Z'),
    dayKey: m.day,
    color: GC[m.grp],
    phase:'Groupe',score:null,status:'SCHEDULED',isLive:false,isFT:false,ko:false,
  }));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderMatchRow(m){
  const sel = selectedId===m.id;
  const row=document.createElement('div');
  row.className='match-row';
  if(sel){row.style.background=hex2rgba(m.color,0.1);row.style.borderLeft=`3px solid ${m.color}`;row.style.paddingLeft='7px';}

  // badge
  const bg=document.createElement('span');
  bg.className='grp-badge';
  bg.style.background=hex2rgba(m.color,0.15);
  bg.style.color=m.color;
  bg.textContent=m.grp?'Gr.'+m.grp:(m.phase||'');

  // id
  const mid=document.createElement('span');
  mid.className='match-id';
  mid.textContent=m.id.length>4?'':m.id;

  // time
  const tim=document.createElement('span');
  tim.className='match-time';
  tim.textContent=m.time||'';

  // teams
  const teams=document.createElement('span');
  teams.className='match-teams';
  teams.innerHTML=`${m.t1}<span class="vs">–</span>${m.t2}`;

  // score / status
  const sc=document.createElement('span');
  sc.className='match-score';
  sc.style.color=m.color;
  if(m.isLive){
    sc.innerHTML=`<span class="status-live">⚡ ${m.score||'0–0'}</span>`;
  } else if(m.isFT && m.score){
    sc.textContent=m.score;
    sc.style.color='#e2e8f0';
  } else {
    sc.innerHTML='<span class="status-ns">–</span>';
  }

  // city
  const city=document.createElement('span');
  city.className='match-city';
  city.textContent=m.city?'📍'+m.city:'';

  row.appendChild(bg);
  row.appendChild(mid);
  row.appendChild(tim);
  row.appendChild(teams);
  row.appendChild(sc);
  row.appendChild(city);

  if(m.last){
    const t=document.createElement('span');
    t.className='tag';
    t.style.background=hex2rgba(m.color,.2);t.style.color=m.color;
    t.textContent='J3';row.appendChild(t);
  }

  row.addEventListener('click',()=>{selectedId=selectedId===m.id?null:m.id;renderAll();});
  return row;
}

function renderDayBlock(dateLabel, matches, container){
  const isToday = matches[0]?.dayKey===TODAY_STR;
  const block=document.createElement('div');block.className='day-block';
  const tlCol=document.createElement('div');tlCol.className='timeline-col';
  const dot=document.createElement('div');dot.className='tl-dot'+(isToday?' today':'');
  const line=document.createElement('div');line.className='tl-line';
  tlCol.appendChild(dot);tlCol.appendChild(line);
  const content=document.createElement('div');content.className='day-content';
  const hdr=document.createElement('div');hdr.className='day-header';
  const lbl=document.createElement('span');lbl.className='day-label'+(isToday?' today':'');lbl.textContent=dateLabel;
  const cnt=document.createElement('span');cnt.className='match-count';
  cnt.textContent=matches.length+' match'+(matches.length>1?'s':'');
  hdr.appendChild(lbl);hdr.appendChild(cnt);
  if(isToday){const t=document.createElement('span');t.className='today-tag';t.textContent="AUJOURD'HUI";hdr.appendChild(t);}
  const list=document.createElement('div');list.className='match-list';
  matches.forEach(m=>list.appendChild(renderMatchRow(m)));
  content.appendChild(hdr);content.appendChild(list);
  block.appendChild(tlCol);block.appendChild(content);
  container.appendChild(block);
}

function renderGrpFilters(){
  const c=document.getElementById('grp-filters');c.innerHTML='';
  const all=document.createElement('button');all.className='grp-btn';all.textContent='Tous';
  if(activeFilter==='all'){all.style.background='#0ea5e922';all.style.borderColor='#0ea5e9';all.style.color='#0ea5e9';}
  all.addEventListener('click',()=>{activeFilter='all';renderAll();});c.appendChild(all);
  Object.entries(GC).forEach(([g,col])=>{
    const btn=document.createElement('button');btn.className='grp-btn';btn.textContent='Gr.'+g;
    if(activeFilter===g){btn.style.background=hex2rgba(col,.13);btn.style.borderColor=col;btn.style.color=col;}
    btn.addEventListener('click',()=>{activeFilter=g;renderAll();});c.appendChild(btn);
  });
}

function renderGroupsTimeline(){
  const c=document.getElementById('groups-timeline');c.innerHTML='';
  const filtered=activeFilter==='all'
    ?allMatches.filter(m=>!m.ko)
    :allMatches.filter(m=>m.grp===activeFilter);
  groupByDate(filtered).forEach(([dl,ms])=>renderDayBlock(dl,ms,c));
}

function renderKOTimeline(){
  const c=document.getElementById('knockout-timeline');c.innerHTML='';
  const ko=allMatches.filter(m=>m.ko);
  groupByDate(ko).forEach(([dl,ms])=>renderDayBlock(dl,ms,c));
}

function renderKOLegend(){
  const c=document.getElementById('ko-legend');c.innerHTML='';
  [
    {label:"32es",color:"#8b5cf6",date:"28 Juin–3 Juil."},
    {label:"16es",color:"#f59e0b",date:"4–7 Juil."},
    {label:"Quarts",color:"#ef4444",date:"9–11 Juil."},
    {label:"Demis",color:"#f97316",date:"14–15 Juil."},
    {label:"Finale",color:"#fbbf24",date:"19 Juil."},
  ].forEach(p=>{
    const s=document.createElement('span');s.className='phase-badge';
    s.style.background=hex2rgba(p.color,.1);s.style.border=`1px solid ${hex2rgba(p.color,.3)}`;s.style.color=p.color;
    s.innerHTML=`${p.label} <span style="opacity:.6">${p.date}</span>`;
    c.appendChild(s);
  });
}

function renderStandings(){
  const grid=document.getElementById('standings-grid');grid.innerHTML='';
  if(!Object.keys(standings).length){
    grid.innerHTML='<p style="color:#475569;font-size:11px;padding:12px">Classements disponibles dès le début du tournoi.</p>';
    return;
  }
  Object.entries(GC).forEach(([g,col])=>{
    if(!standings[g])return;
    const card=document.createElement('div');card.className='standing-card';
    card.style.borderColor=hex2rgba(col,.3);
    const hdr=document.createElement('div');hdr.className='standing-card-header';
    hdr.style.background=hex2rgba(col,.15);hdr.style.color=col;
    hdr.textContent='GROUPE '+g;card.appendChild(hdr);
    standings[g].forEach((r,i)=>{
      const row=document.createElement('div');row.className='standing-row';
      const dot=document.createElement('div');dot.className='qualified-dot';
      dot.style.background=i<2?col:i===2?hex2rgba(col,.4):'#1e3a5f';
      const pos=document.createElement('span');pos.className='standing-pos';pos.style.color=i<2?col:'#475569';pos.textContent=r.pos+'.';
      const team=document.createElement('span');team.className='standing-team';team.textContent=r.team;
      const pts=document.createElement('span');pts.className='standing-pts';pts.style.color=i<2?col:'#64748b';pts.textContent=r.pts;
      const stats=document.createElement('span');stats.className='standing-stats';
      stats.textContent=`${r.played}J ${r.gd>0?'+':''}${r.gd}`;
      row.appendChild(dot);row.appendChild(pos);row.appendChild(team);row.appendChild(pts);row.appendChild(stats);
      card.appendChild(row);
    });
    grid.appendChild(card);
  });
}

function renderAll(){
  renderGrpFilters();
  renderGroupsTimeline();
  renderKOTimeline();
  renderKOLegend();
  renderStandings();
}

// ─── VIEW SWITCHING ───────────────────────────────────────────────────────────
function showView(v){
  ['groups','standings','knockout'].forEach(id=>{
    document.getElementById('view-'+id).classList.toggle('hidden',id!==v);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const ids=['groups','standings','knockout'];
    b.classList.toggle('active',ids[i]===v);
  });
}

function switchView(v){
  activeView=v;
  showView(v);
}

// ─── AUTO REFRESH (every 60s during live matches) ─────────────────────────────
setInterval(()=>{
  const hasLive=allMatches.some(m=>m.isLive);
  if(hasLive)fetchAll();
},60000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
fetchAll();
</script>
</body>
</html>
