<text x="405" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#412402">fetchKeepers()</text>
<text x="405" y="230" text-anchor="middle" font-size="9" fill="#633806">/stats/keepers (Worker KV)</text>
