<rect x="30" y="668" width="14" height="12" rx="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.6"/>
<text x="50" y="678" font-size="8" fill="#475569">Depuis memoire locale : allMatches / standings / scorers</text>
